key: serviceLogging
affectedComponent: FH8VD6HQ69-ZMEG
decisionRationale: >
  Datadog's platform audit log (who changed which monitor, dashboard, or
  alert) is a paid add-on enabled for this account and exported to the
  AU-01 retention archive. Because Datadog is itself the observability
  platform, its audit log is the authoritative record of security-relevant
  configuration changes. Export to a separate archive provides the required
  tamper-evident, centralized store with 12-month retention.
