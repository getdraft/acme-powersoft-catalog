name: "Availability Target — Datadog Observability Platform"
description: >
  Documents the declared availability target and monitoring approach for the
  shared Datadog observability platform in satisfaction of SLA-01 (Service
  Level Agreement).
version: 1.0.0
catalogStatus: complete
lifecycleStatus: candidate
