key: recoverabilityModel
affectedComponent: 0XWT91WY2F-2RR4
decisionRationale: >
  A geo-disaster recovery paired namespace is provisioned in Central US.
  Failover is manual, initiated by the Infra & DevOps on-call engineer
  following RUNBOOK-SB-02. Producers buffer locally for up to 5 minutes
  before failing the originating request during a regional outage. Recovery
  time is bounded by the time to initiate failover and update DNS; tested
  during the annual DR exercise. In-flight messages not yet acknowledged at
  failover time may be lost — this is an accepted risk for event-driven
  workloads.
