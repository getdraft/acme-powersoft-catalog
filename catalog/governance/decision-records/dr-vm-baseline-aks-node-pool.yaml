decisionRationale: >
  OS: Ubuntu 22.04 LTS — Microsoft mainstream support through April 2027 via
  the AKS-supported node image channel. Compute: Azure Standard_D-series v5
  VM SKU — currently in mainstream support with no announced end-of-life date.
  Patch cadence: the AKS NodeImage auto-upgrade channel is enabled on a weekly
  maintenance window, automatically applying OS and kubelet patches without
  manual operator action. Neither component is past its vendor's
  end-of-extended-support date. These declarations satisfy VM-01's requirement
  for a documented patch cadence and confirmed lifecycle status.
