affectedComponent: SP7JGWQ9Z3-DR4F
decisionRationale: >
  RTO: 8 hours (re-run extraction DAGs for the affected partition).
  RPO: 24 hours (one missed nightly load).
  Recovery strategy: ADLS soft-delete (14-day retention window) is the
  primary recovery mechanism for accidental deletion. Because raw landing
  data is re-derivable by re-running each source product's extraction job,
  the landing zone is treated as a cache of extraction, not a sole system of
  record. Full partition loss recovery is therefore a pipeline re-run rather
  than a restore operation. These objectives have been reviewed and accepted
  by the Data & Analytics team.
