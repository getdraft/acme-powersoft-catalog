key: serviceLogging
affectedComponent: Z3CAV76ED8-7XEV
decisionRationale: >
  Snowflake's ACCOUNT_USAGE query history and login history views are
  exported nightly into a dedicated audit schema and forwarded to Datadog
  log management. Datadog provides the tamper-evident, centralized log
  store with at least 12-month retention required by AU-01. The audit schema
  export covers all security-relevant events: queries, logins, role grants,
  and warehouse operations.
