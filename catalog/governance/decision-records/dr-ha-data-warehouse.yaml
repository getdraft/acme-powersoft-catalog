name: "High Availability — Snowflake Data Warehouse"
description: >
  Documents the high-availability mechanism for the shared Snowflake Data
  Warehouse in satisfaction of DR-02 (High Availability).
version: 1.0.0
catalogStatus: complete
lifecycleStatus: candidate
