category: decision
status: accepted
key: ha
affectedComponent: Z3CAV76ED8-7XEV
decisionRationale: >
  Snowflake's multi-cluster warehouse architecture provides automatic cluster
  failover within the Azure East US 2 region. The BI consumption warehouse
  has auto-scaling enabled (multi-cluster); the ELT load warehouse scales
  vertically. In-region node failures are handled transparently by Snowflake's
  platform without operator intervention. Cross-region HA is addressed in the
  DR-01 recoverability record (cross-region clone). These mechanisms satisfy
  DR-02's requirement for backup storage in a separate region or availability
  zone.
