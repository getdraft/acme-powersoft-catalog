key: serviceLogging
affectedComponent: ZV0QNH8M3D-EYW8
decisionRationale: >
  Sign-in and audit logs stream from Azure AD B2C diagnostic settings to
  the Core Platform Log Analytics workspace, then forward to the company-wide
  Datadog log pipeline (via the shared Observability runtime service). Datadog
  provides the tamper-evident, centralized log store with retention meeting
  AU-01's 12-month requirement. All sign-in successes, failures, and admin
  operations are captured.
