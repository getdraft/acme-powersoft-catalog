name: "Access Control — Azure Key Vault Secrets Management"
description: >
  Documents the access control model for the shared Azure Key Vault secrets
  management service in satisfaction of AC-01 (Administrative Access Control).
version: 1.0.0
catalogStatus: complete
lifecycleStatus: candidate
owner:
  team: infra-devops
  contact: infra-devops@acmepowersoft.example.com
