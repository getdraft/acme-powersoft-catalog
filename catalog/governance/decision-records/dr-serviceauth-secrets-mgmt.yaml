category: decision
status: accepted
key: serviceAuthentication
affectedComponent: 37AJ772M7W-V27N
decisionRationale: >
  Access to each product's vault is scoped by Azure RBAC to that product's
  AKS workload identity and the Infra & DevOps break-glass admin group; no
  application uses a vault access policy with broad permissions. The
  break-glass admin account is subject to Acme corporate MFA policy.
  This satisfies AC-01's requirement for named individual accounts and
  no shared broad-access credentials.
