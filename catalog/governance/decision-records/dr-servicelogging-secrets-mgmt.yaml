status: accepted
key: serviceLogging
affectedComponent: 37AJ772M7W-V27N
decisionRationale: >
  Every Get, Set, and Delete operation on a vault secret is logged via
  Key Vault diagnostic settings and streamed to Datadog log management.
  This satisfies AU-01's requirement for centralized, tamper-evident logging
  of security-relevant events, with Datadog providing the 12-month retention
  archive. Secret access constitutes the full set of security-relevant events
  for this service.
