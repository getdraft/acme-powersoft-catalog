affectedComponent: Z3CAV76ED8-7XEV
decisionRationale: >
  RTO: 4 hours (cross-region clone restore).
  RPO: 24 hours (last successful nightly clone).
  Recovery strategy: Snowflake Time Travel (7-day window) handles accidental
  deletion and logical corruption within the primary account. A weekly
  cross-region database clone to a secondary Snowflake account in a different
  Azure region provides catastrophic-loss recovery. Recovery procedures are
  documented and the cross-region clone restore process is tested during the
  annual DR exercise.
