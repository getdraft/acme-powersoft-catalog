key: serviceAuthentication
affectedComponent: Z3CAV76ED8-7XEV
decisionRationale: >
  Analysts and pipeline service accounts authenticate via Azure AD SSO
  federated into Snowflake (SCIM-provisioned roles); no native Snowflake
  passwords are issued. This satisfies AC-01's requirement for named
  individual accounts with strong authentication (Azure AD MFA applies to
  all federated users) and no shared credentials.
