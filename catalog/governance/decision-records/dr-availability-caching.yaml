key: availabilityModel
affectedComponent: 37MYJCZ1V9-439T
decisionRationale: >
  Availability target: 99.9% (aligns with Microsoft's published Azure Cache
  for Redis Premium SLA for zone-redundant deployments in East US 2).
  Architecture: Premium tier with zone redundancy. A cache outage degrades
  entitlement-check latency (falls back to direct Postgres reads) but does
  not cause incorrect entitlement decisions or downtime.
  Monitoring: Datadog Redis integration tracks memory pressure, hit ratio,
  and connected client count. These declarations satisfy SLA-01's requirement
  to declare an availability target and identify the monitoring used to
  measure conformance.
