decisionRationale: >
  Administrators authenticate to the Azure AD B2C admin portal via Acme
  corporate Azure AD with mandatory MFA enforced by Conditional Access
  policy CA-12. No shared admin accounts exist. This directly satisfies
  AC-01's requirement for named individual accounts with multi-factor
  authentication.
