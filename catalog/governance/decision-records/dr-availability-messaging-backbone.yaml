name: "Availability Target — Azure Service Bus Messaging Backbone"
description: >
  Documents the declared availability target and monitoring approach for the
  shared Azure Service Bus messaging backbone in satisfaction of SLA-01
  (Service Level Agreement).
version: 1.0.0
catalogStatus: complete
lifecycleStatus: candidate
