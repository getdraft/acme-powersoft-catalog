status: accepted
key: availabilityModel
affectedComponent: 0XWT91WY2F-2RR4
decisionRationale: >
  Availability target: 99.9% (aligns with Microsoft's published Service Bus
  Premium SLA for zone-redundant deployments in East US 2).
  Architecture: Premium tier with availability zone redundancy.
  Monitoring: Datadog Azure Service Bus integration tracks queue depth,
  dead-letter count, and active connection count per topic. Azure Monitor
  alerts on throttling and dead-letter spikes are routed through the shared
  Observability service. These declarations satisfy SLA-01's requirement to
  declare an availability target and identify the monitoring used to measure
  conformance.
