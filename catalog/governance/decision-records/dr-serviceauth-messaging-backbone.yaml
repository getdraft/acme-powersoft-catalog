key: serviceAuthentication
affectedComponent: 0XWT91WY2F-2RR4
decisionRationale: >
  Producers and consumers authenticate via Azure AD workload identity
  (managed identity per AKS pod); no shared access signature keys are
  distributed to application code. Managed identity tokens are short-lived
  and issued by Azure AD, satisfying AC-01's requirement for non-shared
  named identities with strong authentication.
