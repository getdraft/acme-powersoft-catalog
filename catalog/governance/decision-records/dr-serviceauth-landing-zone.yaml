category: decision
status: accepted
key: serviceAuthentication
affectedComponent: SP7JGWQ9Z3-DR4F
decisionRationale: >
  Airflow worker pods authenticate via Azure AD workload identity scoped to
  read/write on their own product's partition prefix only. No static account
  keys are distributed; workload identity tokens are short-lived and issued
  by Azure AD. This satisfies AC-01's requirement for named, non-shared
  identities with equivalent strong authentication.
