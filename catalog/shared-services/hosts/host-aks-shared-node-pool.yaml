schemaVersion: '1.0'
uid: H1ZTZXV5F6-C1CZ
type: host
name: Shared AKS Node Pool Baseline
description: >
  The common AKS node pool configuration (OS image, VM size, ingress-nginx,
  cert-manager, Datadog DaemonSet) that Infra & DevOps publishes as a
  Terraform module and that every product team's own cluster is built from.
  This Host object models that baseline, not any one product's specific
  cluster instance.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: active
owner:
  team: infra-devops
  contact: infra-devops@acmepowersoft.example.com
tags:
  - host
  - kubernetes
  - shared-service
notes:
  externalInteractionRationales:
    Authentication Platform: Node-level Azure AD-integrated RBAC; no local Kubernetes users exist.
    Logging Service: Container and node logs forwarded via the Datadog Agent DaemonSet rather than Azure Monitor directly, to keep one log pipeline of record.
    Monitoring Service: Datadog Kubernetes integration is the single source of node and pod health for every product cluster.
    Security Monitoring Service: Datadog Cloud Security Management scans node and container configuration against CIS Kubernetes Benchmark.
    Patch Management Platform: AKS node image auto-upgrade channel set to NodeImage, applying OS and kubelet patches on a weekly maintenance window.
  internalComponentRationales:
    Ubuntu 22.04 LTS: Standard AKS-supported node OS image.
    Azure Standard_D-series v5 VM: General-purpose compute tier sized for typical product workloads; teams with different profiles (Data & Analytics' Spark workers) override the node pool VM size in their own infra/ but inherit this baseline module otherwise.
