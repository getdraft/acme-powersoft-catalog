  serviceLogging: Operational logs (throttling, dead-letter events) stream to Datadog via the Azure Service Bus diagnostic settings integration.
  healthWelfareMonitoring: Datadog Azure Service Bus integration tracks queue depth, dead-letter count, and active connection count per topic.
  availabilityModel: Premium tier with availability zone redundancy in East US 2; tracks Microsoft's 99.9% Service Bus Premium SLA.
  scalabilityModel: Messaging units scaled manually today based on quarterly throughput review; auto-scale evaluation tracked under DEVOPS-211.
  recoverabilityModel: Geo-disaster recovery paired namespace in Central US, manual failover initiated by Infra & DevOps on-call per RUNBOOK-SB-02.
  failureDomain: A regional outage affects all cross-product event delivery; producers buffer locally for up to 5 minutes before failing the originating request.
