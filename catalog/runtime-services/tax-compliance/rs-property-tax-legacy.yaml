type: runtime_service
description: |
  Legacy PowerBuilder thick-client + batch application calculating parcel-
  level property tax liability (CALC_PARCEL_TAX_DUE) for utility-regulated
  jurisdictions. Single Windows process on a single on-prem VM. Modeled as
  a runtime_service per Priya's guidance, with several fields answered
  'manual'/'n/a' rather than misrepresented -- see the friction note this
  generates in EXERCISE_REPORT.md.
