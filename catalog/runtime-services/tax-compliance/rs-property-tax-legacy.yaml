architecturalDecisions:
  serviceAuthentication:
    answer: Windows-integrated authentication (local AD). No OAuth/OIDC -- predates the company's Azure AD B2C adoption.
  secretsManagement:
    answer: Oracle connection credentials stored in an encrypted local config file on the VM, not in Key Vault. Migration tracked as TAX-1142.
  serviceLogging:
    answer: 'n/a -- writes to local flat-file logs reviewed manually by the Tax operations team. Not forwarded to the shared Observability runtime service.'
  healthWelfareMonitoring:
    answer: 'n/a -- no automated health checks. Operations team manually verifies nightly batch completion via a flat-file log review.'
  availabilityModel:
    answer: 'n/a -- single instance, no HA. Acceptable risk per business sign-off: batch runs nightly, not customer-facing in real time.'
  scalabilityModel:
    answer: 'n/a -- fixed single-instance capacity. Has never needed to scale; parcel volume is bounded by utility service territory.'
  recoverabilityModel:
    answer: Nightly VM-level backup via the data center's standard backup service. RTO/RPO not formally defined -- TAX-1143.
  failureDomain:
    answer: Single VM, single data center, single point of failure for the entire Property Tax workflow. Known and accepted risk, not yet remediated.
