  name: Orchestration
  tier: application
  description: AKS-hosted Airflow scheduler and worker pods.
- id: landing
  name: Landing Zone
  tier: data
  description: Shared ADLS Gen2 landing zone (raw data).
- id: warehouse
  name: Warehouse
  tier: data
  description: Shared Snowflake warehouse (curated data).
