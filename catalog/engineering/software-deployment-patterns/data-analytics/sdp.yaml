schemaVersion: '1.0'
uid: 0G96X3TRJA-2NY5
type: software_deployment_pattern
name: Acme Insight Hub Pattern
description: |
  Deployment pattern for Insight Hub's ELT and analytics pipeline:
  Airflow on AKS orchestrates extraction from operational stores, lands
  raw data in the shared ADLS Gen2 landing zone, loads it into the shared
  Snowflake warehouse, and periodically retrains the churn-risk model.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: existing-only
owner:
  team: data-analytics
  contact: data-analytics@acmepowersoft.example.com
tags:
- software-deployment-pattern
- data-analytics
businessContext:
  pillar: business-pillar.data-analytics
  productFamily: Acme Insight Hub
architectureNotes:
  availabilityTarget: best-effort (batch); DAG SLA-miss alerting, not uptime-based
  availabilityRequirement: >-
    Single Airflow scheduler (HA mode not yet enabled, DATA-212),
    horizontally-scalable KubernetesExecutor worker pods.
  dataClassification: Internal
  failureDomain:
    scope: single-region
    description: Single AKS cluster, single region. Scheduler is a single point of failure for new DAG triggers.
  patternDeviations: >-
    The only batch/scheduled workload pattern in the catalog -- every
    other SDP models request-driven services.
  deploymentTargets: Shared AKS baseline, East US 2.
  interServiceConnections: >-
    Reads from operational product databases (not yet modeled as explicit
    Relationship objects), writes to the shared ADLS Gen2 landing zone,
    loads from there into the shared Snowflake warehouse.
  externalDependencies: Snowflake, Azure Key Vault, Datadog.
decisionRecords: []
