type: software_deployment_pattern
name: Acme Admin Console Pattern
description: |
  Deployment pattern for the internal Acme Admin Console: containerized
  Next.js app on the shared AKS baseline, no independent data store (reads/
  writes through the Vantage Entitlement API), internal-staff-only access.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: existing-only
owner:
  team: infra-devops
  contact: infra-devops@acmepowersoft.example.com
tags:
- software-deployment-pattern
- infra-devops
- internal-tool
businessContext:
  pillar: business-pillar.platform
  productFamily: Acme Admin Console
notes:
  availabilityTarget: 99% (internal tool, business-hours usage)
  availabilityRequirement: Active-active, fixed 2 replicas.
  dataClassification: Internal
  failureDomain:
    scope: single-region
    description: Single AKS cluster, single region. Lower-impact blast radius than customer-facing products -- support staff lose tooling, customers are unaffected.
  patternDeviations: >-
    Lower availability/scalability bar than every other SDP, by design --
    see the requirement-group-rigor discussion in ONBOARDING.md.
  deploymentTargets: Shared AKS baseline, East US 2.
  interServiceConnections: All data access proxied through the Vantage Entitlement API; no direct database connection of its own.
  externalDependencies: Azure AD B2C, Azure Key Vault, Datadog.
