schemaVersion: '1.0'
uid: NDHCZF14QX-4EVH
type: software_deployment_pattern
name: Acme RegTrack Pattern
description: |
  Deployment pattern for RegTrack: containerized Cost of Service engine on
  the shared AKS baseline, Azure SQL Database for rate-case records, and a
  Power BI Embedded capacity serving the rate-case dashboard to regulators
  and outside counsel.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: existing-only
owner:
  team: regulatory
  contact: regulatory@acmepowersoft.example.com
tags:
- software-deployment-pattern
- regulatory
businessContext:
  pillar: business-pillar.tax-regulatory
  productFamily: Acme RegTrack
notes:
  availabilityTarget: 99.5% (engine) / Microsoft SLA, not independently modeled (Power BI Embedded)
  availabilityRequirement: Active-active AKS pods, zone-redundant SQL Database.
  dataClassification: Confidential
  failureDomain:
    scope: single-region
    description: Same single-region AKS concentration risk as other Azure-AD-B2C-fronted products.
  patternDeviations: >-
    Long-term (10-year) evidentiary record retention and external
    (outside counsel) read access are both handled by processes with no
    representation in this catalog's object model. See commit history for
    the two flagged Schema Completeness gaps.
  deploymentTargets: Shared AKS baseline (engine), Azure SQL Database, Power BI Embedded A2 capacity.
  interServiceConnections: Calls the shared Vantage Entitlement API for licensing checks.
  externalDependencies: Azure AD B2C, Azure Key Vault, Datadog, Power BI Embedded.
