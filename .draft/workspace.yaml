schemaVersion: "1.0"
workspace:
  name: acme-powersoft-catalog
  displayName: Acme PowerSoft DRAFT Workspace
  companyName: Acme PowerSoft

repository:
  provider: github
  owner: getdraft
  name: acme-powersoft-catalog
  defaultBranch: main

framework:
  source: https://github.com/getdraft/draftsman.git
  vendoredPath: .draft/framework
  updatePolicy: explicit
  updateWorkflow: enabled

paths:
  catalog: catalog
  configurations: configurations

requirements:
  # All 6 of Acme's RequirementGroups declare `activation: always` on the
  # object itself (set in Phase 4), so they apply automatically and must
  # NOT also be listed here -- validate.py treats that as a redundant/
  # contradictory declaration ("always-on requirement groups do not need
  # workspace activation"). activeRequirementGroups is reserved for groups
  # authored with `activation: workspace`, which Acme has none of yet.
  activeRequirementGroups: []
  requireActiveRequirementGroupDisposition: false

contribution:
  branchingStrategy: github-flow

# Optional company vocabulary lists. Declare lists gradually. Use advisory while
# onboarding and gated when the company wants validation to block non-standard values.
businessTaxonomy:
  requireSoftwareDeploymentPatternPillar: true
  pillars:
    - id: business-pillar.platform
      name: Platform & Core Services
      owner:
        team: core-platform
        contact: core-platform@acmepowersoft.example.com
    - id: business-pillar.tax-regulatory
      name: Tax & Regulatory
    - id: business-pillar.asset-management
      name: Asset & Lease Management
      owner:
        team: asset-lease
        contact: asset-lease@acmepowersoft.example.com
    - id: business-pillar.data-analytics
      name: Data & Analytics
      owner:
        team: data-analytics
        contact: data-analytics@acmepowersoft.example.com

vocabulary:
  deploymentTargets:
    mode: advisory
    source: configurations/vocabulary/deployment-targets.yaml
  teams:
    mode: advisory
    values:
      - id: core-platform
        name: Core Platform Engineering
        contact: core-platform@acmepowersoft.example.com
      - id: tax-compliance
        name: Tax & Compliance Engineering
        contact: tax-compliance@acmepowersoft.example.com
      - id: asset-lease
        name: Asset & Lease Engineering
        contact: asset-lease@acmepowersoft.example.com
      - id: regulatory
        name: Regulatory Engineering
        contact: regulatory@acmepowersoft.example.com
      - id: data-analytics
        name: Data & Analytics Engineering
        contact: data-analytics@acmepowersoft.example.com
      - id: infra-devops
        name: Infrastructure & DevOps Engineering
        contact: infra-devops@acmepowersoft.example.com
      - id: security-compliance
        name: Security & Compliance
        contact: security-compliance@acmepowersoft.example.com
