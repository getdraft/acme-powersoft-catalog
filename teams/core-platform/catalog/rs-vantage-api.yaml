description: |
  The Acme Vantage product's core ASP.NET Core API: tenant/entitlement
  resolution, plan management, and the cross-product capability lookup
  every other Acme PowerSoft product calls into to determine what a given
  customer is licensed to use. Containerized, deployed to the shared AKS
  baseline (see host H1ZTZXV5F6-C1CZ). Source: getdraft/acme-powersoft-core-platform-product,
  src/Acme.Vantage.Api.
