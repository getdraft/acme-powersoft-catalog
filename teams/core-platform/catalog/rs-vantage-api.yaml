architecturalDecisions:
  serviceAuthentication:
    answer: Delegates to Azure AD B2C (M087QNW2D0-6G06) via the shared Identity & Access runtime service (ZV0QNH8M3D-EYW8).
    satisfiedBy: relatedObject
  secretsManagement:
    answer: Connection strings and signing keys pulled from Azure Key Vault (5Q5CZMHNTR-71A8) via the shared Secrets Management runtime service (37AJ772M7W-V27N).
    satisfiedBy: relatedObject
  serviceLogging:
    answer: Structured logs shipped to the shared Observability runtime service (FH8VD6HQ69-ZMEG) via the Datadog agent sidecar.
    satisfiedBy: relatedObject
  healthWelfareMonitoring:
    answer: Liveness/readiness probes on /healthz, scraped by AKS; alert routing handled by the shared Observability runtime service.
    satisfiedBy: relatedObject
  availabilityModel:
    answer: Active-active, minimum 3 pod replicas behind the shared API Gateway (G5XV9MK4RH-RG0A); targets 99.9% availability.
  scalabilityModel:
    answer: Horizontal pod autoscaling on CPU and request-queue depth, 3-12 replicas.
  recoverabilityModel:
    answer: Stateless service; recovery is pod rescheduling. State lives entirely in the tenancy database (C14NBVQZN9-S0GV).
  failureDomain:
    answer: Single AKS cluster, single Azure region (East US 2). No active-active cross-region failover yet -- tracked as ticket VANT-340.
