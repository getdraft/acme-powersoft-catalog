name: Insight Hub Pipeline Runtime (Airflow)
description: |
  Apache Airflow scheduler + workers running the billing-to-warehouse ELT
  DAG (extract from operational stores, load to Snowflake via the landing
  zone) and the periodic churn-risk model training job. Not request-driven
  like the other products' RuntimeServices -- scheduled batch work.
